<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S3 File Upload System</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      width: 90%;
      max-width: 520px;
      background: white;
      padding: 32px;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      text-align: center;
    }
    h1 { color: #232f3e; margin-bottom: 8px; }
    p { color: #5f6b7a; }
    input[type="file"] {
      width: 100%;
      padding: 14px;
      margin: 18px 0;
      border: 2px dashed #ff9900;
      border-radius: 8px;
      background: #fffaf2;
    }
    button {
      width: 100%;
      padding: 13px;
      border: 0;
      border-radius: 8px;
      background: #ff9900;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { background: #e88b00; }
    .message {
      margin-top: 18px;
      padding: 12px;
      background: #eef7ee;
      border-radius: 7px;
      color: #176b2c;
    }
    .small { font-size: 13px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Upload File to Amazon S3</h1>
    <p>Select a file and store it securely in the cloud.</p>

    <form method="POST" enctype="multipart/form-data">
      <input type="file" name="file" required>
      <button type="submit">Upload File</button>
    </form>

    <p class="small">Maximum size: 10 MB</p>

    {% if message %}
      <div class="message">{{ message }}</div>
    {% endif %}
  </div>
</body>
</html>
